schema_type: archive-pack
version: "1.0"
description: Archived summary of a completed feature with lessons and reusable patterns

required:
  - feature_id
  - product_id
  - title
  - final_status
  - delivered_outputs
  - acceptance_result
  - unresolved_followups
  - decisions_made
  - lessons_learned
  - reusable_patterns
  - archived_at

optional:
  - implementation_summary
  - risk_notes
  - deferred_items
  - related_features
  - archive_version

fields:
  feature_id:
    type: string
    description: Unique identifier for the archived feature
    pattern: "^\\d{3}-[a-z0-9-]+$"
    example: "001-core-object-system"
    required: true

  product_id:
    type: string
    description: Product this feature belonged to
    example: "demo-product-001"
    required: true

  title:
    type: string
    description: Human-readable feature title
    example: "Core Object System"
    required: true

  final_status:
    type: enum
    description: Final completion status
    values:
      - completed
      - partial
      - abandoned
    example: "completed"
    required: true

  delivered_outputs:
    type: array
    description: What was actually delivered
    items_type: object
    example:
      - name: "product-brief.schema.yaml"
        path: "schemas/product-brief.schema.yaml"
        type: "schema"
      - name: "product-brief.template.md"
        path: "templates/product-brief.template.md"
        type: "template"
    required: true

  acceptance_result:
    type: object
    description: Acceptance criteria evaluation
    example:
      satisfied:
        - "All six object schemas exist"
        - "All six templates exist"
      unsatisfied:
        - "Example data incomplete"
      overall: "mostly-satisfied"
    required: true

  unresolved_followups:
    type: array
    description: Items that remain open after completion
    items_type: object
    example:
      - item: "Add validation tests"
        priority: "medium"
        reason: "Deferred for next feature"
    required: true

  decisions_made:
    type: array
    description: Key decisions made during implementation
    items_type: object
    example:
      - decision: "Use YAML for schemas"
        rationale: "Human-readable, better for documentation"
        impact: "All schema files"
    required: true

  lessons_learned:
    type: array
    description: What worked well and what to improve
    items_type: object
    example:
      - lesson: "Small scope definitions work better"
        context: "Day-sized tasks completed reliably"
      - lesson: "Acceptance criteria need explicit verification"
        context: "Two criteria were unclear"
    required: true

  reusable_patterns:
    type: array
    description: Patterns that can be reused in future features
    items_type: object
    example:
      - pattern: "Schema + Template + Example structure"
        applicability: "All object definitions"
      - pattern: "YAML block in markdown for artifacts"
        applicability: "All artifact files"
    required: true

  archived_at:
    type: datetime
    description: When this archive was created
    example: "2024-01-15T18:00:00Z"
    required: true

  implementation_summary:
    type: string
    description: Brief summary of what was implemented
    example: "Defined six core objects with schemas, templates, and examples."
    required: false

  risk_notes:
    type: array
    description: Risk observations from implementation
    items_type: object
    example:
      - risk: "Schema complexity grew unexpectedly"
        mitigation: "Stay minimal for v1"
    required: false

  deferred_items:
    type: array
    description: Items explicitly deferred to future work
    items_type: object
    example:
      - item: "Advanced validation rules"
        reason: "Out of v1 scope"
        suggested_feature: "002-validation"
    required: false

  related_features:
    type: array
    description: Features that depend on or relate to this one
    items_type: string
    example:
      - "002-day-loop-cli"
      - "003-single-feature-demo"
    required: false

  archive_version:
    type: string
    description: Version of archive format
    example: "1.0"
    required: false

lifecycle:
  created_by: archive-feature command
  update_frequency: never (immutable after creation)
  update_triggers: []

validation:
  - feature_id must follow pattern
  - final_status must be valid enum
  - delivered_outputs must have at least one item
  - lessons_learned must have at least one item
  - archived_at must be valid datetime
  - acceptance_result must have overall field

json_schema:
  "$schema": "http://json-schema.org/draft-07/schema#"
  type: object
  required:
    - feature_id
    - product_id
    - title
    - final_status
    - delivered_outputs
    - acceptance_result
    - unresolved_followups
    - decisions_made
    - lessons_learned
    - reusable_patterns
    - archived_at
  properties:
    feature_id:
      type: string
      pattern: "^\\d{3}-[a-z0-9-]+$"
    product_id:
      type: string
    title:
      type: string
    final_status:
      enum:
        - completed
        - partial
        - abandoned
    delivered_outputs:
      type: array
      items:
        type: object
        properties:
          name:
            type: string
          path:
            type: string
          type:
            type: string
    acceptance_result:
      type: object
      properties:
        satisfied:
          type: array
          items:
            type: string
        unsatisfied:
          type: array
          items:
            type: string
        overall:
          type: string
    unresolved_followups:
      type: array
      items:
        type: object
        properties:
          item:
            type: string
          priority:
            type: string
          reason:
            type: string
    decisions_made:
      type: array
      items:
        type: object
        properties:
          decision:
            type: string
          rationale:
            type: string
          impact:
            type: string
    lessons_learned:
      type: array
      minItems: 1
      items:
        type: object
        properties:
          lesson:
            type: string
          context:
            type: string
    reusable_patterns:
      type: array
      minItems: 1
      items:
        type: object
        properties:
          pattern:
            type: string
          applicability:
            type: string
    archived_at:
      type: string
      format: date-time
    implementation_summary:
      type: string
    risk_notes:
      type: array
      items:
        type: object
        properties:
          risk:
            type: string
          mitigation:
            type: string
    deferred_items:
      type: array
      items:
        type: object
        properties:
          item:
            type: string
          reason:
            type: string
          suggested_feature:
            type: string
    related_features:
      type: array
      items:
        type: string
    archive_version:
      type: string