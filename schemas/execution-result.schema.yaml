schema_type: execution-result
version: "1.1"
description: Structured outcome of a daytime execution run with checkpoint semantics (Feature 037)

required:
  - execution_id
  - status
  - completed_items
  - artifacts_created
  - verification_result
  - issues_found
  - blocked_reasons
  - decisions_required
  - recommended_next_step

optional:
  - browser_verification
  - orchestration_terminal_state
  - closeout_state
  - closeout_terminal_state
  - closeout_result
  - issues_resolved
  - metrics
  - notes
  - warnings
  - duration
  - checkpoint_type
  - continuation_decision

fields:
  execution_id:
    type: string
    description: Execution run identifier
    example: "exec-20240115-001"
    required: true

  status:
    type: enum
    description: Overall execution status
    values:
      - success
      - partial
      - blocked
      - failed
      - stopped
    example: "success"
    required: true

  completed_items:
    type: array
    description: Items successfully completed
    items_type: string
    example:
      - "product-brief.schema.yaml"
      - "feature-spec.schema.yaml"
    required: true

  artifacts_created:
    type: array
    description: Artifacts produced
    items_type: object
    example:
      - name: "product-brief.schema.yaml"
        path: "schemas/product-brief.schema.yaml"
        type: file
    required: true

  verification_result:
    type: object
    description: Verification step results
    example:
      passed: 3
      failed: 0
      skipped: 0
      details:
        - "Required fields: passed"
        - "JSON Schema: passed"
        - "Terminology: passed"
    required: true

  issues_found:
    type: array
    description: Issues discovered during execution
    items_type: object
    example:
      - type: warning
        description: "Minor naming inconsistency"
        severity: low
        resolution: fixed
    required: true

  issues_resolved:
    type: array
    description: Issues resolved during this execution
    items_type: object
    example:
      - description: "Test fixture path issue"
        resolution: "Adjusted fixture setup"
        resolved_at: "2026-04-11T11:00"
    required: false

  blocked_reasons:
    type: array
    description: Reasons execution blocked
    items_type: object
    example: []
    required: true

  decisions_required:
    type: array
    description: Decisions needing human input
    items_type: object
    example:
      - decision: "schema-format-choice"
        context: "All schema files need format"
        options:
          - "YAML"
          - "JSON"
        recommendation: "YAML"
        urgency: high
    required: true

  recommended_next_step:
    type: string
    description: AI recommendation for continuation
    example: "Continue with RunState and ExecutionPack schemas"
    required: true

  metrics:
    type: object
    description: Execution metrics
    example:
      files_read: 5
      files_written: 2
      actions_taken: 12
      decisions_made: 0
    required: false

  notes:
    type: string
    description: Free-form notes
    example: "Execution proceeded smoothly"
    required: false

  warnings:
    type: array
    description: Non-blocking warnings
    items_type: string
    example: []
    required: false

  duration:
    type: duration
    description: Total execution time
    example: "2h30m"
    required: false

  checkpoint_type:
    type: string
    description: Type of checkpoint event (Feature 037)
    example: "iteration_completed"
    required: false

  continuation_decision:
    type: object
    description: Continuation evaluation result (Feature 037)
    example:
      state: "continue"
      next_stage: "execution_pack_generation"
      reason: "Checkpoint reached. No stop conditions apply."
    required: false

  orchestration_terminal_state:
    type: enum
    description: Terminal state for browser verification orchestration (Feature 060)
    values:
      - not_required
      - required_not_started
      - in_progress
      - success
      - failure
      - timeout
      - exception_accepted
      - skipped_by_policy
    example: "success"
    required: false

  closeout_state:
    type: enum
    description: Closeout lifecycle state for external execution (Feature 061)
    values:
      - external_execution_triggered
      - external_execution_pending
      - external_execution_result_detected
      - post_external_verification_required
      - post_external_verification_running
      - post_external_verification_completed
      - external_execution_stalled
      - closeout_timeout
      - closeout_completed_success
      - closeout_completed_failure
      - closeout_recovery_required
    example: "closeout_completed_success"
    required: false

  closeout_terminal_state:
    type: enum
    description: Terminal classification for external closeout outcome (Feature 061)
    values:
      - success
      - failure
      - verification_failure
      - closeout_timeout
      - stalled
      - recovery_required
    example: "success"
    required: false

  closeout_result:
    type: object
    description: Full closeout orchestration result details (Feature 061)
    required: false
    properties:
      closeout_state:
        type: string
        description: Current closeout state
      closeout_terminal_state:
        type: string
        description: Terminal classification if closeout complete
      execution_result_detected:
        type: boolean
        description: Whether execution result was detected during closeout
      execution_result_valid:
        type: boolean
        description: Whether execution result was valid
      verification_required:
        type: boolean
        description: Whether frontend verification was required
      verification_completed:
        type: boolean
        description: Whether frontend verification completed
      verification_terminal_state:
        type: string
        description: Verification orchestration terminal state
      poll_attempts:
        type: integer
        description: Number of polling attempts
      elapsed_seconds:
        type: number
        description: Total closeout elapsed time
      timeout_seconds:
        type: integer
        description: Configured timeout
      started_at:
        type: string
        description: Closeout start timestamp
      finished_at:
        type: string
        description: Closeout finish timestamp
      recovery_required:
        type: boolean
        description: Whether fallback recovery is needed
      recovery_reason:
        type: string
        description: Reason for recovery if required
      stall_detected:
        type: boolean
        description: Whether stall was detected
      closeout_error:
        type: string
        description: Error message if closeout failed
    example:
      closeout_state: "closeout_completed_success"
      closeout_terminal_state: "success"
      execution_result_detected: true
      execution_result_valid: true
      verification_required: true
      verification_completed: true
      poll_attempts: 3
      elapsed_seconds: 45.2
      timeout_seconds: 120

  browser_verification:
    type: object
    description: Browser-level verification evidence (Feature 038)
    required: false
    properties:
      executed:
        type: boolean
        description: Whether browser verification was actually executed
      passed:
        type: integer
        description: Number of scenarios that passed
      failed:
        type: integer
        description: Number of scenarios that failed
      skipped:
        type: integer
        description: Number of scenarios skipped
      exception_reason:
        type: enum
        description: Structured reason if browser verification could not run
        values:
          - playwright_unavailable
          - environment_blocked
          - browser_install_failed
          - ci_container_limitation
          - missing_credentials
          - deterministic_blocker
          - reclassified_noninteractive
      scenarios_run:
        type: array
        description: List of scenarios that were executed
        items_type: string
      screenshots:
        type: array
        description: Paths to screenshot artifacts
        items_type: string
      duration:
        type: string
        description: Time spent on browser verification
    example:
      executed: true
      passed: 5
      failed: 0
      skipped: 1
      scenarios_run:
        - "Navigate to home page"
        - "Click login button"
        - "Submit form"
      screenshots:
        - "screenshots/home.png"
        - "screenshots/login.png"
      duration: "2m30s"

lifecycle:
  created_by: run-day workflow
  update_frequency: never
  consumed_by:
    - review-night workflow
    - resume-next-day workflow

usage_rules:
  for_runstate:
    - completed_items maps to completed_outputs
    - artifacts_created maps to artifacts
    - blocked_reasons maps to blocked_items
    - decisions_required maps to decisions_needed
    - recommended_next_step maps to next_recommended_action
  for_review_pack:
    - completed_items maps to what_was_completed
    - artifacts_created maps to evidence
    - issues_found maps to problems_found
    - blocked_reasons maps to blocked_items
    - decisions_required maps to decisions_needed
    - recommended_next_step maps to tomorrow_plan

validation:
  - execution_id must match ExecutionPack
  - status must be valid enum
  - if blocked, blocked_reasons must have items
  - if partial, completed_items must be non-empty
  - verification_result must have counts

json_schema:
  "$schema": "http://json-schema.org/draft-07/schema#"
  type: object
  required:
    - execution_id
    - status
    - completed_items
    - artifacts_created
    - verification_result
    - issues_found
    - blocked_reasons
    - decisions_required
    - recommended_next_step
  properties:
    execution_id:
      type: string
    status:
      enum:
        - success
        - partial
        - blocked
        - failed
        - stopped
    completed_items:
      type: array
      items:
        type: string
    artifacts_created:
      type: array
      items:
        type: object
        required:
          - name
          - path
          - type
        properties:
          name:
            type: string
          path:
            type: string
          type:
            enum:
              - file
              - document
              - log
              - data
    verification_result:
      type: object
      properties:
        passed:
          type: integer
        failed:
          type: integer
        skipped:
          type: integer
        details:
          type: array
          items:
            type: string
    issues_found:
      type: array
      items:
        type: object
        properties:
          type:
            enum:
              - error
              - warning
              - note
          description:
            type: string
          severity:
            enum:
              - high
              - medium
              - low
          resolution:
            enum:
              - fixed
              - pending
              - deferred
    issues_resolved:
      type: array
      items:
        type: object
        properties:
          description:
            type: string
          resolution:
            type: string
          resolved_at:
            type: string
    blocked_reasons:
      type: array
      items:
        type: object
        required:
          - reason
          - impact
        properties:
          reason:
            type: string
          impact:
            type: string
          since:
            type: string
            format: date-time
    decisions_required:
      type: array
      items:
        type: object
        required:
          - decision
          - context
          - options
        properties:
          decision:
            type: string
          context:
            type: string
          options:
            type: array
            items:
              type: string
          recommendation:
            type: string
          urgency:
            enum:
              - high
              - medium
              - low
    recommended_next_step:
      type: string
    metrics:
      type: object
      properties:
        files_read:
          type: integer
        files_written:
          type: integer
        actions_taken:
          type: integer
        decisions_made:
          type: integer
    notes:
      type: string
    warnings:
      type: array
      items:
        type: string
    duration:
      type: string
    browser_verification:
      type: object
      properties:
        executed:
          type: boolean
        passed:
          type: integer
        failed:
          type: integer
        skipped:
          type: integer
        exception_reason:
          enum:
            - playwright_unavailable
            - environment_blocked
            - browser_install_failed
            - ci_container_limitation
            - missing_credentials
            - deterministic_blocker
            - reclassified_noninteractive
        scenarios_run:
          type: array
          items:
            type: string
        screenshots:
          type: array
          items:
            type: string
        duration:
          type: string
    orchestration_terminal_state:
      enum:
        - not_required
        - required_not_started
        - in_progress
        - success
        - failure
        - timeout
        - exception_accepted
        - skipped_by_policy
    closeout_state:
      enum:
        - external_execution_triggered
        - external_execution_pending
        - external_execution_result_detected
        - post_external_verification_required
        - post_external_verification_running
        - post_external_verification_completed
        - external_execution_stalled
        - closeout_timeout
        - closeout_completed_success
        - closeout_completed_failure
        - closeout_recovery_required
    closeout_terminal_state:
      enum:
        - success
        - failure
        - verification_failure
        - closeout_timeout
        - stalled
        - recovery_required
    closeout_result:
      type: object
      properties:
        closeout_state:
          type: string
        closeout_terminal_state:
          type: string
        execution_result_detected:
          type: boolean
        execution_result_valid:
          type: boolean
        verification_required:
          type: boolean
        verification_completed:
          type: boolean
        verification_terminal_state:
          type: string
        poll_attempts:
          type: integer
        elapsed_seconds:
          type: number
        timeout_seconds:
          type: integer
        started_at:
          type: string
        finished_at:
          type: string
        recovery_required:
          type: boolean
        recovery_reason:
          type: string
        stall_detected:
          type: boolean
        closeout_error:
          type: string